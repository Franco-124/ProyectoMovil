name: payremind
description: "Automated payment reminders for freelancers"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # HTTP
  dio: ^5.4.3
  
  # Storage seguro para JWT
  flutter_secure_storage: ^9.0.0
  
  # Navegación
  go_router: ^14.2.0
  
  # Modelos
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  
  # Utilidades
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_lint: ^2.3.10
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
